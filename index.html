<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun ke-20th Sayangku avv ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Efek Taburan Hati */
        .heart-fall {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: fall linear forwards;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* Wadah Utama dengan Efek Pop-up Masuk */
        .container {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            text-align: center;
            max-width: 480px;
            width: 90%;
            z-index: 10;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 {
            color: #ff4d6d;
            margin-bottom: 15px;
            font-size: 1.8rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Efek Teks Mengetik Otomatis */
        .ucapan-wrapper {
            min-height: 50px;
            margin-bottom: 20px;
        }
        
        p.ucapan {
            color: #4a4a4a;
            font-size: 1.05rem;
            line-height: 1.6;
            display: inline;
        }

        /* Galeri Foto & Transisi Keren (Scale + Fade) */
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 350px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            background-color: #f0f0f0;
        }

        .mySlides {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transform: scale(1.1); /* Default agak besar untuk efek zoom out */
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ketika foto aktif, dia memudar masuk dan mengecil pas */
        .mySlides.active {
            opacity: 1;
            transform: scale(1);
        }

        .mySlides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tombol Navigasi */
        .nav-btn {
            margin-top: 25px;
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            font-weight: bold;
        }

        .nav-btn:hover {
            background: #ff758f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.6);
        }

        /* Tombol Musik Mengambang */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #ff4d6d;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Tombol Kontrol Musik -->
    <div class="music-control" id="musicBtn" onclick="toggleMusic()">🎵</div>

    <!-- ELEMEN AUDIO (Ganti lagunya di sini) -->
    <audio id="bgMusic" loop>
        <source src="lagu.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung pemutar musik ini.
    </audio>

    <div class="container">
        <h1>Happy Birthday, Sayangku Semoga Panjang Umur Dan Sehat selalu avv 🎉❤️</h1>
        
        <div class="ucapan-wrapper">
            <p class="ucapan" id="typingText"></p>
        </div>
        
        <!-- BAGIAN FOTO -->
        <!-- BAGIAN FOTO (Sudah disesuaikan untuk 10 foto) -->
        <div class="slideshow-container">
            <div class="mySlides active"><img src="foto1.jpeg" alt="Momen 1"></div>
            <div class="mySlides"><img src="foto2.jpeg" alt="Momen 2"></div>
            <div class="mySlides"><img src="foto3.jpeg" alt="Momen 3"></div>
            <div class="mySlides"><img src="foto4.jpeg" alt="Momen 4"></div>
            <div class="mySlides"><img src="foto5.jpeg" alt="Momen 5"></div>
            <div class="mySlides"><img src="foto6.jpeg" alt="Momen 6"></div>
            <div class="mySlides"><img src="foto7.jpeg" alt="Momen 7"></div>
            <div class="mySlides"><img src="foto8.jpeg" alt="Momen 8"></div>
            <div class="mySlides"><img src="foto9.jpeg" alt="Momen 9"></div>
            <div class="mySlides"><img src="foto10.jpeg" alt="Momen 10"></div>
        </div>

        <button class="nav-btn" onclick="nextSlide()">Lihat Momen Kita ✨</button>
    </div>

    <script>
        // --- 1. Konfigurasi Musik & Autoplay ---
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.innerText = "❤️";
                musicBtn.style.animationPlayState = "running";
            } else {
                music.pause();
                musicBtn.innerText = "🎵";
                musicBtn.style.animationPlayState = "paused";
            }
        }

        // Karena browser zaman sekarang memblokir musik otomatis, 
        // musik akan langsung berputar begitu pacarmu menyentuh/klik apa saja di layar pertama kali
        document.body.addEventListener('click', () => {
            if (music.paused) {
                toggleMusic();
            }
        }, { once: true });


        // --- 2. Animasi Ketikan Teks (Typing Effect) ---
        const txt = "Selamat ulang tahun untuk orang yang paling berharga di hidupku. Terima kasih sudah terus menemani langkahku dan membagikan senyum manismu. Aku punya sedikit rangkuman perjalanan kita di bawah ini... 🥰";
        let speed = 60; // Kecepatan ketik (milidetik per huruf)
        let i = 0;

        function typeWriter() {
            if (i < txt.length) {
                document.getElementById("typingText").innerHTML += txt.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }
        // Mulai ketik otomatis setelah animasi container selesai
        setTimeout(typeWriter, 1000);


        // --- 3. Logika Slideshow Zoom + Fade ---
        let slideIndex = 0;
        const slides = document.querySelectorAll('.mySlides');

        function showSlides() {
            slides[slideIndex].classList.remove('active');
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
        }

        function nextSlide() {
            clearInterval(slideInterval);
            showSlides();
            slideInterval = setInterval(showSlides, 3500); // 3.5 detik per foto
        }

        let slideInterval = setInterval(showSlides, 3500);


        // --- 4. Efek Dekorasi Hati Jatuh ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');
            heart.innerText = ['❤️', '💖', '💝', '🌸', '✨'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 3 + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 450);
    </script>
</body>
</html>
