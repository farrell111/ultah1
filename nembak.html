<!DOCTYPE html>
<html>


<head>

<title>Untuk Marisa ❤️</title>


<style>


body{

margin:0;
height:100vh;
overflow:hidden;

background:linear-gradient(#ff9a9e,#fad0c4);

font-family:Arial;

display:flex;
justify-content:center;
align-items:center;

}



.card{

background:white;

width:330px;

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:0 0 30px gray;

z-index:2;

}



img{

width:180px;
height:180px;

border-radius:50%;

object-fit:cover;

}



h1{

color:#ff3366;

}



button{

padding:12px 25px;

border:none;

border-radius:20px;

font-size:18px;

cursor:pointer;

}



.yes{

background:#ff3366;

color:white;

}



.no{

background:#555;

color:white;

position:absolute;

}



.heart{

position:absolute;

font-size:30px;

animation:jatuh 4s linear infinite;

}



@keyframes jatuh{


from{

top:-10%;

}


to{

top:110%;

}


}


#special{

display:none;

color:#ff3366;

}


</style>

</head>



<body>



<audio id="musik" loop>

<source src="static/lagu.mp3" type="audio/mp3">

</audio>




<div class="card">


<img src="static/foto.jpg">


<h1>

Hai Marisa ❤️

</h1>


<p>

Aku punya sesuatu yang mau aku bilang...

<br><br>


Aku senang bisa kenal kamu.

Aku nyaman sama kamu.

<br><br>


Mau gak kamu jadi orang spesial buat aku? 🥰

</p>




<button class="yes" onclick="iya()">

MAU ❤️

</button>




<button class="no" onmouseover="kabur()">

TIDAK 😢

</button>



<div id="special">

<h2>

Yeay ❤️

</h2>


<p>

Mulai hari ini jadi cerita baru kita semoga kita selalu bersama dan menua bersama ya sayang 🥰

</p>


<p id="tanggal"></p>


</div>



</div>





<script>



function iya(){


document.querySelector(".yes").style.display="none";

document.querySelector(".no").style.display="none";


document.getElementById("special").style.display="block";



document.getElementById("tanggal").innerHTML=

"❤️ "+new Date().toLocaleString("id-ID");




for(let i=0;i<100;i++){


let love=document.createElement("div");


love.className="heart";

love.innerHTML="❤️";


love.style.left=Math.random()*100+"%";


document.body.appendChild(love);



setTimeout(()=>{

love.remove();

},5000);


}


}



function kabur(){


let btn=document.querySelector(".no");


btn.style.left=Math.random()*80+"%";


btn.style.top=Math.random()*80+"%";


}



document.body.onclick=function(){

document.getElementById("musik").play();

}



</script>


</body>


</html>
